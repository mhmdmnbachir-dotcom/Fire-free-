<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MORJAR FF TOP UP</title><style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0b1020,#1e1b4b,#111827);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
}

.container{
    width:92%;
    max-width:420px;
    background:#111827;
    padding:25px;
    border-radius:24px;
    box-shadow:0 0 30px rgba(0,0,0,0.5);
    border:1px solid rgba(255,255,255,0.08);
}

.logo{
    text-align:center;
    font-size:30px;
    font-weight:bold;
    color:#a855f7;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#9ca3af;
    margin-bottom:25px;
    font-size:14px;
}

label{
    display:block;
    margin-bottom:8px;
    margin-top:14px;
    font-size:14px;
}

input,select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#1f2937;
    color:white;
    font-size:15px;
    outline:none;
}

button{
    width:100%;
    padding:15px;
    margin-top:24px;
    border:none;
    border-radius:14px;
    background:#9333ea;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
    background:#7e22ce;
}

.loading{
    display:none;
    margin-top:22px;
    text-align:center;
    color:#facc15;
    font-size:16px;
}

.result{
    display:none;
    margin-top:22px;
    background:#16a34a;
    padding:15px;
    border-radius:14px;
    text-align:center;
    font-weight:bold;
}

.footer{
    text-align:center;
    margin-top:18px;
    color:#6b7280;
    font-size:12px;
}
</style></head>
<body><div class="container"><div class="logo">MORJAR FF</div>
<div class="subtitle">شحن جواهر فري فاير</div><label>أدخل ID اللاعب</label> <input type="text" id="uid" placeholder="مثال: 123456789">

<label>اختر عدد الجواهر</label> <select id="diamonds">

<option>اختر الباقة</option>
<option>110 جوهرة</option>
<option>220 جوهرة</option>
<option>530 جوهرة</option>
<option>1080 جوهرة</option>
<option>2200 جوهرة</option>
<option>5600 جوهرة</option>
</select><label>اختر الدولة</label> <select>

<option>الجزائر</option>
<option>المغرب</option>
<option>تونس</option>
<option>مصر</option>
<option>السعودية</option>
</select><button onclick="fakeTopup()">شحن الآن</button>

<div class="loading" id="loading">
⏳ جاري معالجة الطلب...
</div><div class="result" id="result"></div><div class="footer">MORJAR FF © 2026</div></div><script>
function fakeTopup(){

    let uid = document.getElementById('uid').value;
    let diamonds = document.getElementById('diamonds').value;

    if(uid === ''){
        alert('أدخل ID اللاعب');
        return;
    }

    if(diamonds === 'اختر الباقة'){
        alert('اختر عدد الجواهر');
        return;
    }

    document.getElementById('result').style.display = 'none';
    document.getElementById('loading').style.display = 'block';

    setTimeout(() => {
        document.getElementById('loading').style.display = 'none';

        document.getElementById('result').innerHTML =
        '✅ تم إرسال طلب شحن ' + diamonds + '<br>إلى الحساب: ' + uid;

        document.getElementById('result').style.display = 'block';

    },3000);
}
</script></body>
</html>
